<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greeting for Ashwin</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f8ff;
        }
        .greeting {
            font-size: 3rem;
            color: #2c3e50;
            text-align: center;
            padding: 20px;
            border: 3px solid #3498db;
            border-radius: 15px;
            background-color: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
        .namaste {
            color: #e74c3c;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="greeting">
        Hello Ashwin, <span class="namaste">Namaste!</span> 🙏
    </div>
</body>
</html>
